name: Nightly Detail Regression

on:
  schedule:
    # 02:00 China Standard Time (UTC+8) every day.
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-detail-regression
  cancel-in-progress: true

jobs:
  detail-regression:
    name: Detail Regression Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: frontend/node_modules/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run detail regression smoke test
        run: |
          cd frontend
          npm run test:e2e:smoke
        env:
          CI: true
          PLAYWRIGHT_WEB_SERVER: '1'

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-detail-regression-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
