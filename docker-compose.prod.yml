services:
  db:
    image: postgres:16-alpine
    container_name: gzeams-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gzeams}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gzeams}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gzeams-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        REQUIREMENTS_FILE: production.txt
    container_name: gzeams-backend-prod
    restart: unless-stopped
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "4",
        "--timeout",
        "120",
      ]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${PROD_ALLOWED_HOSTS:-localhost,127.0.0.1}
      FRONTEND_URL: ${PROD_FRONTEND_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${PROD_CORS_ALLOWED_ORIGINS:-http://localhost}
      CSRF_TRUSTED_ORIGINS: ${PROD_CSRF_TRUSTED_ORIGINS:-http://localhost}
      HEALTH_METRICS_ALLOWLIST: ${PROD_HEALTH_METRICS_ALLOWLIST:-127.0.0.1,::1}
      HEALTH_METRICS_TOKEN: ${PROD_HEALTH_METRICS_TOKEN:-replace-with-strong-random-token}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-gzeams}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      DATABASE_URL: ${PROD_DATABASE_URL:-postgresql://postgres:postgres@db:5432/gzeams}
      REDIS_URL: ${PROD_REDIS_URL:-redis://redis:6379/0}
      BOOTSTRAP_DEFAULTS_ON_STARTUP: ${BOOTSTRAP_DEFAULTS_ON_STARTUP:-1}
    expose:
      - "8000"
    volumes:
      - backend_logs:/var/log/gzeams
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health/live/', timeout=3).getcode() == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gzeams-frontend-prod
    restart: unless-stopped
    command:
      [
        "/bin/sh",
        "-c",
        "rm -rf /frontend-dist/* && cp -r /usr/share/nginx/html/. /frontend-dist/ && exec nginx -g 'daemon off;'",
      ]
    expose:
      - "80"
    volumes:
      - frontend_dist:/frontend-dist
    healthcheck:
      test: ["CMD-SHELL", "test -f /frontend-dist/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: gzeams-nginx-prod
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_files:/var/www/backend/static:ro
      - media_files:/var/www/backend/media:ro

volumes:
  backend_logs:
  frontend_dist:
  media_files:
  postgres_data:
  redis_data:
  static_files:
